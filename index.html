    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Saturday Movie Night · Complete Tracker</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Helvetica Neue', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0b1120 0%, #111827 100%);
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            background: rgba(15, 25, 45, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 24px 20px 32px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin: 0 0 8px;
            background: linear-gradient(135deg, #FFD966, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .saturday-selector {
            background: #07121f;
            border-radius: 60px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        .saturday-selector label {
            color: #FFD966;
            font-weight: bold;
        }
        #saturdayPicker {
            background: #1e2a3e;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid #FFD966;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .new-saturday-btn {
            background: #2c3e5c;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .add-section {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .add-section input {
            flex: 2;
            padding: 12px 18px;
            border-radius: 60px;
            border: none;
            background: #1e2a3e;
            color: white;
            font-size: 1rem;
        }
        .add-section select {
            background: #1e2a3e;
            color: white;
            border-radius: 60px;
            padding: 12px 18px;
            border: none;
            cursor: pointer;
        }
        .add-section button {
            background: #3b5d8c;
            border: none;
            border-radius: 60px;
            padding: 12px 24px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }
        .panel {
            background: #07121f;
            border-radius: 28px;
            padding: 16px;
            border: 1px solid #FFD96630;
        }
        .panel h3 {
            margin: 0 0 12px 0;
            color: #FFD966;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .movie-list {
            max-height: 350px;
            overflow-y: auto;
        }
        .movie-item {
            background: #0a1622;
            padding: 10px 12px;
            margin: 6px 0;
            border-radius: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .movie-item.highlight {
            background: #f5b64230;
            border-left: 4px solid #FFD966;
        }
        .movie-name {
            flex: 1;
            color: white;
            font-size: 0.9rem;
        }
        .arrow-icon {
            font-size: 1.3rem;
        }
        .action-btn {
            background: #2e5e3b;
            border: none;
            padding: 4px 12px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .action-btn.watch {
            background: #2e5e3b;
        }
        .action-btn.remove {
            background: #7a2e2e;
        }
        .action-btn.back {
            background: #3a5e7a;
        }
        .spin-area {
            text-align: center;
            margin: 16px 0;
        }
        #spinBtn {
            background: radial-gradient(circle at 30% 10%, #ffb347, #ff7e05);
            border: none;
            padding: 14px 32px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 80px;
            cursor: pointer;
            box-shadow: 0 6px 0 #9b4b00;
            transition: 0.05s linear;
        }
        #spinBtn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #9b4b00;
        }
        .status-msg {
            text-align: center;
            color: #b9d0ff;
            font-size: 0.8rem;
            margin-top: 12px;
            padding: 8px;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            color: #5a6e8c;
            margin-top: 20px;
        }
        @media (max-width: 650px) {
            .two-columns {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .container {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🍿 SATURDAY MOVIE NIGHT 🎬</h1>

    <!-- Saturday selector dropdown -->
    <div class="saturday-selector">
        <label>📅 Saturday:</label>
        <select id="saturdayPicker"></select>
        <button class="new-saturday-btn" id="newSaturdayBtn">➕ New Saturday</button>
        <button class="new-saturday-btn" id="refreshBtn">🔄 Refresh</button>
    </div>

    <!-- Add movie section -->
    <div class="add-section">
        <input type="text" id="movieInput" placeholder="Movie title..." autocomplete="off">
        <select id="addToListSelect">
            <option value="pool">🎯 Movie Pool (to spin)</option>
            <option value="considered">🤔 Considered Watching</option>
        </select>
        <button id="addBtn">➕ Add Movie</button>
    </div>

    <!-- Two column layout -->
    <div class="two-columns">
        <!-- Left: Movie Pool (to spin) -->
        <div class="panel">
            <h3>🎯 MOVIE POOL <span style="font-size:0.7rem;">(spin from here)</span></h3>
            <div id="poolList" class="movie-list">
                <div style="text-align:center; color:#6b7f9f; padding:20px;">Loading...</div>
            </div>
        </div>

        <!-- Right: Considered Watching -->
        <div class="panel">
            <h3>🤔 CONSIDERED WATCHING</h3>
            <div id="consideredList" class="movie-list">
                <div style="text-align:center; color:#6b7f9f; padding:20px;">Loading...</div>
            </div>
        </div>
    </div>

    <!-- Spin button -->
    <div class="spin-area">
        <button id="spinBtn">🎲 SPIN TO PICK 🎲</button>
    </div>

    <!-- Watched list (bottom) -->
    <div class="panel">
        <h3>✅ WATCHED ON SATURDAY</h3>
        <div id="watchedList" class="movie-list">
            <div style="text-align:center; color:#6b7f9f; padding:20px;">Loading...</div>
        </div>
        <button id="clearWatchedBtn" style="margin-top:12px; background:#4a2a2a; border:none; padding:6px 12px; border-radius:30px; color:white; cursor:pointer;">🗑️ Clear Watched History</button>
    </div>

    <div id="statusMsg" class="status-msg">✨ Ready! Pick a Saturday to get started.</div>
    <footer>Shared via Firebase · Each Saturday has its own pool, considered, and watched lists</footer>
</div>

<script>
    // ========== 🔥 REPLACE WITH YOUR FIREBASE CONFIG ==========
    const firebaseConfig = {
        apiKey: "AIzaSyCTfeyF0TYe8QurlRLOjxc8EbNByzAh5fc",
    authDomain: "movie-night-spinner.firebaseapp.com",
    projectId: "movie-night-spinner",
    storageBucket: "movie-night-spinner.firebasestorage.app",
    messagingSenderId: "761257355395",
    appId: "1:761257355395:web:bd822140a4a071a7b2d3b6"
    };
    // ===========================================================

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Collections structure:
    // saturdays/{saturdayId} - just to track available Saturdays
    // saturdayData/{saturdayId}/pool - movies to spin from
    // saturdayData/{saturdayId}/considered - movies considered but not picked
    // saturdayData/{saturdayId}/watched - movies watched that Saturday

    let currentSaturdayId = null;
    let currentPoolMovies = [];
    let currentConsideredMovies = [];
    let currentWatchedMovies = [];
    let currentHighlightIndex = 0;
    let isSpinning = false;
    let spinInterval = null;

    // Helper: format YYYY-MM-DD for Saturday
    function formatSaturday(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    function getThisSaturday() {
        const today = new Date();
        const day = today.getDay();
        const daysUntilSaturday = (day === 6) ? 0 : (6 - day);
        const thisSaturday = new Date(today);
        thisSaturday.setDate(today.getDate() + daysUntilSaturday);
        return formatSaturday(thisSaturday);
    }

    // Load all Saturdays into dropdown
    async function loadSaturdayDropdown() {
        const snapshot = await db.collection("saturdays").orderBy("date", "desc").get();
        const dropdown = document.getElementById("saturdayPicker");
        dropdown.innerHTML = "";
        
        const saturdays = [];
        snapshot.forEach(doc => {
            saturdays.push({ id: doc.id, date: doc.data().date });
        });
        
        if (saturdays.length === 0) {
            // Create default (this Saturday)
            const defaultDate = getThisSaturday();
            await db.collection("saturdays").doc(defaultDate).set({ date: defaultDate, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            saturdays.push({ id: defaultDate, date: defaultDate });
        }
        
        saturdays.forEach(sat => {
            const option = document.createElement("option");
            option.value = sat.id;
            option.textContent = `Saturday ${sat.date}`;
            dropdown.appendChild(option);
        });
        
        if (!currentSaturdayId || !saturdays.find(s => s.id === currentSaturdayId)) {
            currentSaturdayId = saturdays[0].id;
        }
        dropdown.value = currentSaturdayId;
        await loadSaturdayData();
    }

    // Load all data for current Saturday
    async function loadSaturdayData() {
        if (!currentSaturdayId) return;
        
        // Load pool
        const poolSnapshot = await db.collection("saturdayData").doc(currentSaturdayId).collection("pool").orderBy("createdAt", "asc").get();
        currentPoolMovies = [];
        poolSnapshot.forEach(doc => {
            currentPoolMovies.push({ id: doc.id, name: doc.data().name });
        });
        
        // Load considered
        const consideredSnapshot = await db.collection("saturdayData").doc(currentSaturdayId).collection("considered").orderBy("createdAt", "asc").get();
        currentConsideredMovies = [];
        consideredSnapshot.forEach(doc => {
            currentConsideredMovies.push({ id: doc.id, name: doc.data().name });
        });
        
        // Load watched
        const watchedSnapshot = await db.collection("saturdayData").doc(currentSaturdayId).collection("watched").orderBy("watchedAt", "desc").get();
        currentWatchedMovies = [];
        watchedSnapshot.forEach(doc => {
            currentWatchedMovies.push({ id: doc.id, name: doc.data().name, date: doc.data().dateWatched });
        });
        
        renderAllLists();
    }

    function renderAllLists() {
        renderPoolList();
        renderConsideredList();
        renderWatchedList();
    }

    function renderPoolList() {
        const container = document.getElementById("poolList");
        if (currentPoolMovies.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#6b7f9f; padding:20px;">🎯 No movies in pool. Add some!</div>';
            return;
        }
        
        let html = '';
        currentPoolMovies.forEach((movie, idx) => {
            const isHighlight = (idx === currentHighlightIndex);
            html += `
                <div class="movie-item ${isHighlight ? 'highlight' : ''}">
                    <span class="arrow-icon">${isHighlight ? '👉' : '  '}</span>
                    <span class="movie-name">${escapeHtml(movie.name)}</span>
                    <button class="action-btn remove" onclick="moveToConsidered('${movie.id}', '${escapeHtml(movie.name)}')">🤔 Considered</button>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function renderConsideredList() {
        const container = document.getElementById("consideredList");
        if (currentConsideredMovies.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#6b7f9f; padding:20px;">🤔 No considered movies yet.</div>';
            return;
        }
        
        let html = '';
        currentConsideredMovies.forEach(movie => {
            html += `
                <div class="movie-item">
                    <span class="movie-name">🤔 ${escapeHtml(movie.name)}</span>
                    <button class="action-btn back" onclick="moveToPool('${movie.id}', '${escapeHtml(movie.name)}')">⬅️ Back to Pool</button>
                    <button class="action-btn remove" onclick="deleteConsidered('${movie.id}')">❌ Remove</button>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function renderWatchedList() {
        const container = document.getElementById("watchedList");
        if (currentWatchedMovies.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#6b7f9f; padding:20px;">✅ No movies watched this Saturday yet.</div>';
            return;
        }
        
        let html = '';
        currentWatchedMovies.forEach(movie => {
            html += `
                <div class="movie-item">
                    <span class="movie-name">✅ ${escapeHtml(movie.name)}</span>
                    <span style="color:#FFD966; font-size:0.7rem;">${movie.date || 'Saturday'}</span>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    // Move movie from pool to considered
    window.moveToConsidered = async function(movieId, movieName) {
        try {
            // Add to considered
            await db.collection("saturdayData").doc(currentSaturdayId).collection("considered").add({
                name: movieName,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            // Delete from pool
            await db.collection("saturdayData").doc(currentSaturdayId).collection("pool").doc(movieId).delete();
            showStatus(`🤔 "${movieName}" moved to Considered Watching`);
            await loadSaturdayData();
        } catch(e) {
            showStatus("Error moving to considered", true);
        }
    };

    // Move from considered back to pool
    window.moveToPool = async function(consideredId, movieName) {
        try {
            await db.collection("saturdayData").doc(currentSaturdayId).collection("pool").add({
                name: movieName,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            await db.collection("saturdayData").doc(currentSaturdayId).collection("considered").doc(consideredId).delete();
            showStatus(`🎯 "${movieName}" moved back to Pool`);
            await loadSaturdayData();
        } catch(e) {
            showStatus("Error moving to pool", true);
        }
    };

    // Delete from considered
    window.deleteConsidered = async function(consideredId) {
        try {
            await db.collection("saturdayData").doc(currentSaturdayId).collection("considered").doc(consideredId).delete();
            showStatus(`Removed from Considered list`);
            await loadSaturdayData();
        } catch(e) {
            showStatus("Error removing", true);
        }
    };

    // Mark as watched (from pool only)
    async function markAsWatched(movieId, movieName) {
        const saturdayDate = currentSaturdayId;
        try {
            await db.collection("saturdayData").doc(currentSaturdayId).collection("watched").add({
                name: movieName,
                dateWatched: saturdayDate,
                watchedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            await db.collection("saturdayData").doc(currentSaturdayId).collection("pool").doc(movieId).delete();
            showStatus(`✅ "${movieName}" watched on ${saturdayDate}!`);
            await loadSaturdayData();
            if (currentPoolMovies.length === 0) {
                showStatus("🎉 All movies watched or moved to considered!");
            }
        } catch(e) {
            showStatus("Error marking watched", true);
        }
    }

    // Spin animation
    async function spin() {
        if (isSpinning) {
            showStatus("Already spinning!", true);
            return;
        }
        if (currentPoolMovies.length === 0) {
            showStatus("No movies in pool to spin! Add some movies or move from Considered list.", true);
            return;
        }
        
        isSpinning = true;
        const spinBtn = document.getElementById("spinBtn");
        spinBtn.innerText = "🌀 SPINNING...";
        
        const totalMovies = currentPoolMovies.length;
        let steps = 0;
        const maxSteps = 25 + Math.floor(Math.random() * 20);
        let intervalTime = 70;
        
        if (spinInterval) clearInterval(spinInterval);
        
        spinInterval = setInterval(() => {
            currentHighlightIndex = (currentHighlightIndex + 1) % totalMovies;
            renderPoolList();
            steps++;
            
            if (steps > maxSteps - 12) intervalTime = 160;
            else if (steps > maxSteps - 20) intervalTime = 110;
            else if (steps > maxSteps - 28) intervalTime = 85;
            
            if (steps >= maxSteps) {
                clearInterval(spinInterval);
                spinInterval = null;
                const chosenMovie = currentPoolMovies[currentHighlightIndex];
                showStatus(`🎉 LANDED ON: "${chosenMovie.name}"! Click the button to mark as watched. 🎉`);
                spinBtn.innerText = "🎲 SPIN TO PICK 🎲";
                isSpinning = false;
                
                // Auto-scroll to highlight
                setTimeout(() => {
                    const highlighted = document.querySelector('.movie-item.highlight');
                    if (highlighted) highlighted.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 100);
            }
        }, intervalTime);
    }

    // Add movie to either pool or considered
    async function addMovie() {
        const input = document.getElementById("movieInput");
        const movieName = input.value.trim();
        if (!movieName) return;
        
        const targetList = document.getElementById("addToListSelect").value;
        const collectionName = targetList === "pool" ? "pool" : "considered";
        
        try {
            await db.collection("saturdayData").doc(currentSaturdayId).collection(collectionName).add({
                name: movieName,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            input.value = "";
            showStatus(`➕ "${movieName}" added to ${targetList === "pool" ? "Movie Pool" : "Considered Watching"}`);
            await loadSaturdayData();
        } catch(e) {
            showStatus("Failed to add movie. Check Firebase rules.", true);
        }
    }

    // Create new Saturday
    async function createNewSaturday() {
        const newDate = prompt("Enter Saturday date (YYYY-MM-DD):", getThisSaturday());
        if (!newDate) return;
        
        try {
            await db.collection("saturdays").doc(newDate).set({ date: newDate, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            await loadSaturdayDropdown();
            showStatus(`📅 Created Saturday ${newDate}`);
        } catch(e) {
            showStatus("Error creating new Saturday", true);
        }
    }

    async function clearWatchedHistory() {
        if (!confirm("Clear all watched movies for this Saturday?")) return;
        const batch = db.batch();
        const watchedSnapshot = await db.collection("saturdayData").doc(currentSaturdayId).collection("watched").get();
        watchedSnapshot.forEach(doc => batch.delete(doc.ref));
        await batch.commit();
        await loadSaturdayData();
        showStatus("Watched history cleared for this Saturday");
    }

    function showStatus(msg, isError = false) {
        const statusDiv = document.getElementById("statusMsg");
        statusDiv.innerHTML = msg;
        statusDiv.style.color = isError ? "#ffaa99" : "#b9d0ff";
        setTimeout(() => {
            if (document.getElementById("statusMsg")?.innerHTML === msg) {
                statusDiv.style.color = "#b9d0ff";
            }
        }, 3000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Event listeners
    document.getElementById("addBtn").addEventListener("click", addMovie);
    document.getElementById("spinBtn").addEventListener("click", spin);
    document.getElementById("newSaturdayBtn").addEventListener("click", createNewSaturday);
    document.getElementById("clearWatchedBtn").addEventListener("click", clearWatchedHistory);
    document.getElementById("refreshBtn").addEventListener("click", () => loadSaturdayData());
    document.getElementById("saturdayPicker").addEventListener("change", async (e) => {
        currentSaturdayId = e.target.value;
        currentHighlightIndex = 0;
        await loadSaturdayData();
    });
    document.getElementById("movieInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") addMovie();
    });

    // Make markAsWatched available globally
    window.markAsWatched = markAsWatched;
    
    // Initialize
    loadSaturdayDropdown();
</script>
</body>
</html>

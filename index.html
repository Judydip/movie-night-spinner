<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>NERD HERD · Saturday Movie Night</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0a0f1c 0%, #0f172a 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 950px;
            margin: 0 auto;
        }
        /* Passcode screen */
        .passcode-screen {
            background: rgba(15, 25, 45, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 40px 24px;
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
            border: 1px solid #FFD966;
        }
        .passcode-screen h2 { color: #FFD966; margin-bottom: 24px; }
        .passcode-screen input {
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            border: none;
            background: #1e2a3e;
            color: white;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 16px;
        }
        .passcode-screen button {
            background: #FFB347;
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
        }
        .error-msg { color: #ff8888; margin-top: 12px; font-size: 0.85rem; }
        
        /* Main App */
        .main-app {
            display: none;
            background: rgba(15, 25, 45, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 24px 20px 32px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
        }
        
        /* NERD HERD Header */
        .nerd-herd {
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: white;
            letter-spacing: 4px;
            margin: 0 0 10px 0;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        
        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin: 0 0 8px;
            background: linear-gradient(135deg, #FFD966, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .saturday-bar {
            background: #07121f;
            border-radius: 60px;
            padding: 10px 20px;
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        .saturday-bar label { color: #FFD966; font-weight: bold; }
        #saturdayPicker {
            background: #1e2a3e;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid #FFD966;
            cursor: pointer;
            font-family: monospace;
            font-size: 0.9rem;
        }
        .new-saturday-btn {
            background: #2c3e5c;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        
        .pool-section {
            background: #07121f;
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #4a7a3a;
        }
        .section-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .pool-title { color: #7eff6e; }
        .add-movie-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .add-movie-form input {
            flex: 2;
            padding: 12px 16px;
            border-radius: 60px;
            border: none;
            background: #1e2a3e;
            color: white;
            min-width: 150px;
        }
        .add-movie-form button {
            background: #3b5d8c;
            border: none;
            padding: 12px 20px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .movie-list {
            max-height: 350px;
            overflow-y: auto;
        }
        .movie-item {
            background: #0a1622;
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .movie-item.highlight {
            background: #f5b64230;
            border-left: 6px solid #FFD966;
            box-shadow: 0 0 15px rgba(255, 185, 50, 0.4);
            transform: scale(1.01);
            transition: 0.05s linear;
        }
        .movie-name {
            flex: 1;
            color: white;
            font-weight: 500;
            word-break: break-word;
            min-width: 120px;
        }
        .action-btn {
            background: #2e5e3b;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            white-space: nowrap;
        }
        .action-btn.watch { background: #2e7d32; }
        .action-btn.consider { background: #7a5a2e; }
        .action-btn.remove { background: #7a2e2e; }
        .action-btn.back { background: #3a5e7a; }
        
        .spin-section {
            background: linear-gradient(135deg, #1a2a3a, #0f1a25);
            border-radius: 48px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: center;
            border: 2px solid #FFD966;
        }
        #spinBtn {
            background: radial-gradient(circle at 30% 10%, #ffb347, #ff7e05);
            border: none;
            padding: 16px 32px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 80px;
            cursor: pointer;
            box-shadow: 0 6px 0 #9b4b00;
            transition: 0.05s linear;
            width: 100%;
            max-width: 280px;
            white-space: nowrap;
        }
        @media (max-width: 480px) {
            #spinBtn { font-size: 1.2rem; padding: 12px 20px; white-space: normal; }
        }
        #spinBtn:active { transform: translateY(4px); box-shadow: 0 2px 0 #9b4b00; }
        .spin-status {
            margin-top: 15px;
            font-size: 1rem;
            color: #FFD966;
            min-height: 50px;
        }
        
        .considered-section {
            background: #07121f;
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #7a6a3a;
        }
        .considered-title { color: #ffcf6e; }
        
        .watched-section {
            background: #07121f;
            border-radius: 32px;
            padding: 20px;
            border: 1px solid #3a6e7a;
        }
        .watched-title { color: #6ec8ff; }
        
        .watched-item, .considered-item {
            background: #0a1622;
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 40px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }
        .watched-movie, .considered-movie {
            flex: 3;
            min-width: 150px;
            color: white;
            word-break: break-word;
            overflow-wrap: break-word;
        }
        .watched-date {
            color: #FFD966;
            font-family: monospace;
            cursor: pointer;
            text-decoration: underline dotted;
            white-space: nowrap;
        }
        .edit-icon, .delete-icon, .move-up, .move-down {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 4px 8px;
            white-space: nowrap;
        }
        .edit-icon:hover { color: #FFD966; }
        .delete-icon:hover { color: #ff6e6e; }
        .move-up:hover, .move-down:hover { color: #FFD966; }
        
        .status-msg {
            text-align: center;
            color: #b9d0ff;
            font-size: 0.8rem;
            margin-top: 16px;
            padding: 8px;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            color: #5a6e8c;
            margin-top: 20px;
        }
        
        @media (max-width: 650px) {
            .container { padding: 0; }
            .main-app { padding: 16px; }
            .movie-item { flex-direction: column; align-items: stretch; }
            .action-btn { width: 100%; text-align: center; white-space: normal; }
            .watched-item, .considered-item { flex-direction: column; align-items: stretch; text-align: center; }
            .watched-date { white-space: normal; text-align: center; }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.2s ease-in-out 3; }
    </style>
</head>
<body>
<div class="container">
    <div id="passcodeScreen" class="passcode-screen">
        <h2>🔐 Private Movie Night</h2>
        <input type="password" id="passcodeInput" placeholder="Enter passcode" autocomplete="off">
        <button id="unlockBtn">Unlock</button>
        <div id="passcodeError" class="error-msg"></div>
    </div>

    <div id="mainApp" class="main-app">
        <div class="nerd-herd">NERD HERD</div>
        
        <!-- GIF - change the 80px to whatever size you want -->
        <div style="text-align: center; margin: 10px 0;">
            <img src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExdXl1Ynl5aXJ4ZmM4ZGoyY2pkbmZiMzVxZXF2MjI1Z25vNzhscDM0dSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/9Y1wF3wx1Dex8w9wxL/giphy.gif" style="width: 200px; border-radius: 20px;">
        </div>
        
        <h1>🍿 SATURDAY MOVIE NIGHT 🎬</h1>
        
        <div class="saturday-bar">
            <label>📅 Saturday:</label>
            <select id="saturdayPicker"></select>
            <button class="new-saturday-btn" id="newSaturdayBtn">➕ New Saturday</button>
            <button class="new-saturday-btn" id="refreshBtn">🔄 Refresh</button>
        </div>
        
        <!-- CURRENT MOVIE POOL -->
        <div class="pool-section">
            <div class="section-title">
                <span class="pool-title">🎯 CURRENT MOVIE POOL</span>
                <span id="poolCount" style="color:#7eff6e; font-size:0.9rem;"></span>
            </div>
            <div class="add-movie-form">
                <input type="text" id="movieInput" placeholder="Add movie title..." autocomplete="off">
                <button id="addToPoolBtn">➕ Add to Pool</button>
            </div>
            <div id="poolList" class="movie-list"><div style="text-align:center; color:#6b7f9f;">Loading...</div></div>
            <div id="moveAllToConsideredContainer" style="margin-top: 12px; text-align: center; display: none;">
                <button id="moveAllToConsideredBtn" class="action-btn" style="background:#7a5a2e;">📦 Move all remaining to Considered</button>
            </div>
        </div>
        
        <!-- SPIN SECTION -->
        <div class="spin-section">
            <button id="spinBtn">SPIN TO WIN!</button>
            <div id="spinStatus" class="spin-status">✨ Ready to spin! ✨</div>
        </div>
        
        <!-- CONSIDERED LIST -->
        <div class="considered-section">
            <div class="section-title">
                <span class="considered-title">📋 CONSIDERED LIST</span>
                <span id="consideredCount" style="color:#ffcf6e; font-size:0.9rem;"></span>
            </div>
            <div class="add-movie-form">
                <input type="text" id="consideredInput" placeholder="Add movie directly to Considered..." autocomplete="off">
                <button id="addToConsideredBtn">➕ Add to Considered</button>
            </div>
            <div id="consideredList" class="movie-list"><div style="text-align:center; color:#6b7f9f;">Loading...</div></div>
        </div>
        
        <!-- ALL WATCHED -->
        <div class="watched-section">
            <div class="section-title">
                <span class="watched-title">✅ ALL WATCHED</span>
                <span id="watchedCount" style="color:#6ec8ff; font-size:0.9rem;"></span>
            </div>
            <div class="add-movie-form" style="margin-bottom: 16px;">
                <input type="text" id="directWatchedInput" placeholder="Movie title..." autocomplete="off">
                <label style="color:white; display:flex; align-items:center; gap:5px;">
                    <input type="checkbox" id="naCheckbox"> 📅 N/A
                </label>
                <button id="addDirectToWatchedBtn">➕ Add to Watched</button>
            </div>
            <div id="watchedList" class="movie-list"><div style="text-align:center; color:#6b7f9f;">Loading...</div></div>
        </div>
        
        <div id="statusMsg" class="status-msg">🎬 Ready! Select a Saturday, add movies, and spin.</div>
        <footer>🔒 Passcode protected · Click any date to edit · N/A movies can be reordered</footer>
    </div>
</div>

<script>
    // ========== FIREBASE CONFIG (REPLACE WITH YOURS) ==========
    const firebaseConfig = {
         apiKey: "AIzaSyCTfeyF0TYe8QurlRLOjxc8EbNByzAh5fc",
    authDomain: "movie-night-spinner.firebaseapp.com",
    projectId: "movie-night-spinner",
    storageBucket: "movie-night-spinner.firebasestorage.app",
    messagingSenderId: "761257355395",
    appId: "1:761257355395:web:bd822140a4a071a7b2d3b6"
    };
    // ===========================================================
    
    // ========== SECRET PASSCODE (CHANGE THIS) ==========
    const SECRET_PASSCODE = "nerds";
    // ===================================================
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    let currentSaturdayId = null;
    let poolMovies = [];
    let consideredMovies = [];
    let watchedMovies = [];
    let currentHighlightIndex = 0;
    let isSpinning = false;
    let spinInterval = null;
    
    function formatDateForDisplay(dateStr) {
        if (!dateStr || dateStr === "N/A") return "N/A";
        if (dateStr.match(/^\d{4}-\d{2}-\d{2}$/)) {
            const [year, month, day] = dateStr.split('-');
            return `${month}-${day}-${year}`;
        }
        return dateStr;
    }
    
    function getTodayFormatted() {
        const today = new Date();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        const year = today.getFullYear();
        return `${month}-${day}-${year}`;
    }
    
    function getThisSaturdayFormatted() {
        const today = new Date();
        const day = today.getDay();
        const daysUntilSaturday = (day === 6) ? 0 : (6 - day);
        const sat = new Date(today);
        sat.setDate(today.getDate() + daysUntilSaturday);
        const month = String(sat.getMonth() + 1).padStart(2, '0');
        const date = String(sat.getDate()).padStart(2, '0');
        const year = sat.getFullYear();
        return `${month}-${date}-${year}`;
    }
    
    async function loadSaturdays() {
        const snapshot = await db.collection("saturdays").orderBy("date", "desc").get();
        const dropdown = document.getElementById("saturdayPicker");
        dropdown.innerHTML = "";
        const saturdays = [];
        snapshot.forEach(doc => { saturdays.push({ id: doc.id, date: doc.data().date }); });
        if (saturdays.length === 0) {
            const defaultDate = getThisSaturdayFormatted();
            await db.collection("saturdays").doc(defaultDate).set({ date: defaultDate });
            saturdays.push({ id: defaultDate, date: defaultDate });
        }
        saturdays.forEach(sat => {
            const option = document.createElement("option");
            option.value = sat.id;
            option.textContent = sat.date;
            dropdown.appendChild(option);
        });
        if (!currentSaturdayId || !saturdays.find(s => s.id === currentSaturdayId)) {
            currentSaturdayId = saturdays[0].id;
        }
        dropdown.value = currentSaturdayId;
    }
    
    async function loadAllData() {
        try {
            const poolSnap = await db.collection("moviePool").orderBy("createdAt", "asc").get();
            poolMovies = [];
            poolSnap.forEach(doc => { poolMovies.push({ id: doc.id, name: doc.data().name }); });
            
            const consideredSnap = await db.collection("considered").orderBy("order", "asc").get();
            consideredMovies = [];
            consideredSnap.forEach(doc => {
                consideredMovies.push({ id: doc.id, name: doc.data().name, order: doc.data().order });
            });
            
            const watchedSnap = await db.collection("watched").orderBy("order", "asc").get();
            watchedMovies = [];
            watchedSnap.forEach(doc => {
                watchedMovies.push({ id: doc.id, name: doc.data().name, date: doc.data().date, order: doc.data().order });
            });
            
            renderPool();
            renderConsidered();
            renderWatched();
            
            document.getElementById("poolCount").innerText = `${poolMovies.length} movies`;
            document.getElementById("consideredCount").innerText = `${consideredMovies.length} movies`;
            document.getElementById("watchedCount").innerText = `${watchedMovies.length} movies`;
            
            const moveBtn = document.getElementById("moveAllToConsideredContainer");
            moveBtn.style.display = poolMovies.length > 0 ? "block" : "none";
        } catch (e) { console.error(e); showStatus("Error loading data", true); }
    }
    
    function isDuplicate(movieName, list) {
        return list.some(m => m.name.toLowerCase() === movieName.toLowerCase());
    }
    
    async function editMovieTitle(listType, movieId, currentName) {
        const newName = prompt(`Edit title:\n"${currentName}"\n\nNew title:`, currentName);
        if (!newName || newName.trim() === currentName) return;
        const trimmedName = newName.trim();
        let targetList;
        if (listType === 'pool') targetList = poolMovies;
        else if (listType === 'considered') targetList = consideredMovies;
        else targetList = watchedMovies;
        if (isDuplicate(trimmedName, targetList.filter(m => m.id !== movieId))) {
            showStatus(`⚠️ "${trimmedName}" already exists!`, true);
            return;
        }
        try {
            let collectionName = listType === 'pool' ? "moviePool" : (listType === 'considered' ? "considered" : "watched");
            await db.collection(collectionName).doc(movieId).update({ name: trimmedName });
            showStatus(`✏️ Renamed to "${trimmedName}"`);
            await loadAllData();
        } catch(e) { showStatus("Error: " + e.message, true); }
    }
    
    function renderPool() {
        const container = document.getElementById("poolList");
        if (poolMovies.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#6b7f9f; padding:20px;">🎯 No movies in pool. Add some!</div>';
            return;
        }
        let html = '';
        poolMovies.forEach((movie, idx) => {
            const isHighlight = (idx === currentHighlightIndex);
            html += `<div class="movie-item ${isHighlight ? 'highlight' : ''}" data-id="${movie.id}" data-name="${escapeHtml(movie.name)}">
                <span class="movie-name">${escapeHtml(movie.name)}</span>
                <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                    <button class="action-btn edit" data-action="edit">✏️ Edit</button>
                    <button class="action-btn watch" data-action="watch">🎬 Watched</button>
                    <button class="action-btn consider" data-action="consider">📋 Consider</button>
                </div>
            </div>`;
        });
        container.innerHTML = html;
        container.querySelectorAll('.movie-item').forEach(item => {
            const movieId = item.dataset.id;
            const movieName = item.dataset.name;
            item.querySelector('[data-action="edit"]')?.addEventListener('click', () => editMovieTitle('pool', movieId, movieName));
            item.querySelector('[data-action="watch"]')?.addEventListener('click', () => markWatchedFromPool(movieId, movieName));
            item.querySelector('[data-action="consider"]')?.addEventListener('click', () => moveToConsidered(movieId, movieName));
        });
    }
    
    function renderConsidered() {
        const container = document.getElementById("consideredList");
        if (consideredMovies.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#6b7f9f; padding:20px;">📋 No movies in Considered.</div>';
            return;
        }
        let html = '';
        consideredMovies.forEach((movie, idx) => {
            html += `<div class="watched-item" data-id="${movie.id}" data-name="${escapeHtml(movie.name)}" data-order="${idx}">
                <span class="watched-movie">📋 ${escapeHtml(movie.name)}</span>
                <div style="display: flex; gap: 4px; flex-wrap: wrap;">
                    <button class="edit-icon" data-action="editTitle" title="Edit title">✏️</button>
                    <button class="edit-icon" data-action="moveToWatched" title="Move to Watched">✅</button>
                    <button class="edit-icon" data-action="backToPool" title="Back to Pool">↩️</button>
                    <button class="delete-icon" data-action="delete" title="Delete">🗑️</button>
                    <button class="move-up" data-action="moveUp" title="Move up">↑</button>
                    <button class="move-down" data-action="moveDown" title="Move down">↓</button>
                </div>
            </div>`;
        });
        container.innerHTML = html;
        container.querySelectorAll('.watched-item').forEach((item, idx) => {
            const movieId = item.dataset.id;
            const movieName = item.dataset.name;
            item.querySelector('[data-action="editTitle"]')?.addEventListener('click', () => editMovieTitle('considered', movieId, movieName));
            item.querySelector('[data-action="moveToWatched"]')?.addEventListener('click', () => moveToWatchedFromConsidered(movieId, movieName));
            item.querySelector('[data-action="backToPool"]')?.addEventListener('click', () => moveBackToPool(movieId, movieName));
            item.querySelector('[data-action="delete"]')?.addEventListener('click', () => deleteConsidered(movieId, movieName));
            item.querySelector('[data-action="moveUp"]')?.addEventListener('click', () => reorderConsidered(movieId, 'up', idx));
            item.querySelector('[data-action="moveDown"]')?.addEventListener('click', () => reorderConsidered(movieId, 'down', idx));
        });
    }
    
    function renderWatched() {
        const container = document.getElementById("watchedList");
        if (watchedMovies.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#6b7f9f; padding:20px;">✅ No watched movies yet.</div>';
            return;
        }
        let html = '';
        watchedMovies.forEach((movie, idx) => {
            const displayDate = formatDateForDisplay(movie.date);
            const isNA = (movie.date === "N/A");
            html += `<div class="watched-item" data-id="${movie.id}" data-name="${escapeHtml(movie.name)}" data-date="${movie.date || 'N/A'}" data-order="${idx}">
                <span class="watched-movie">✅ ${escapeHtml(movie.name)}</span>
                <span class="watched-date" data-action="editDate">📅 ${displayDate}</span>
                <div style="display: flex; gap: 4px; flex-wrap: wrap;">
                    <button class="edit-icon" data-action="editTitle" title="Edit title">✏️</button>
                    <button class="edit-icon" data-action="editDate" title="Edit date">📅</button>
                    <button class="delete-icon" data-action="delete" title="Delete">🗑️</button>
                    ${isNA ? `<button class="move-up" data-action="moveUp" title="Move up">↑</button>
                              <button class="move-down" data-action="moveDown" title="Move down">↓</button>` : ''}
                </div>
            </div>`;
        });
        container.innerHTML = html;
        container.querySelectorAll('.watched-item').forEach((item, idx) => {
            const movieId = item.dataset.id;
            const movieName = item.dataset.name;
            const currentDate = item.dataset.date;
            item.querySelector('[data-action="editTitle"]')?.addEventListener('click', () => editMovieTitle('watched', movieId, movieName));
            item.querySelectorAll('[data-action="editDate"]').forEach(btn => {
                btn.addEventListener('click', () => editWatchedDate(movieId, movieName, currentDate));
            });
            item.querySelector('[data-action="delete"]')?.addEventListener('click', () => deleteWatched(movieId, movieName));
            item.querySelector('[data-action="moveUp"]')?.addEventListener('click', () => reorderWatched(movieId, 'up', idx));
            item.querySelector('[data-action="moveDown"]')?.addEventListener('click', () => reorderWatched(movieId, 'down', idx));
        });
    }
    
    async function markWatchedFromPool(movieId, movieName) {
        const dateToUse = currentSaturdayId;
        try {
            const newOrder = watchedMovies.length;
            await db.collection("watched").add({ name: movieName, date: dateToUse, order: newOrder, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            await db.collection("moviePool").doc(movieId).delete();
            showStatus(`✅ "${movieName}" watched on ${dateToUse}!`);
            await loadAllData();
            if (poolMovies.length > 0 && confirm(`Move remaining ${poolMovies.length} movie(s) to Considered?`)) {
                for (let movie of poolMovies) {
                    await db.collection("considered").add({ name: movie.name, order: consideredMovies.length, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                    await db.collection("moviePool").doc(movie.id).delete();
                }
                showStatus(`📋 Moved to Considered.`);
                await loadAllData();
            }
        } catch(e) { showStatus("Error: " + e.message, true); }
    }
    
    async function moveToConsidered(movieId, movieName) {
        try {
            await db.collection("considered").add({ name: movieName, order: consideredMovies.length, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            await db.collection("moviePool").doc(movieId).delete();
            showStatus(`📋 "${movieName}" moved to Considered.`);
            await loadAllData();
        } catch(e) { showStatus("Error: " + e.message, true); }
    }
    
    async function moveToWatchedFromConsidered(consideredId, movieName) {
        const dateInput = prompt(`Date for "${movieName}" (MM-DD-YYYY or N/A):`, getTodayFormatted());
        if (!dateInput) return;
        let finalDate = dateInput.trim().toUpperCase();
        if (finalDate !== "N/A" && !finalDate.match(/^\d{2}-\d{2}-\d{4}$/)) { alert("Use MM-DD-YYYY or N/A"); return; }
        try {
            await db.collection("watched").add({ name: movieName, date: finalDate, order: watchedMovies.length, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            await db.collection("considered").doc(consideredId).delete();
            showStatus(`✅ "${movieName}" added to Watched`);
            await loadAllData();
        } catch(e) { showStatus("Error: " + e.message, true); }
    }
    
    async function moveBackToPool(consideredId, movieName) {
        try {
            await db.collection("moviePool").add({ name: movieName, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            await db.collection("considered").doc(consideredId).delete();
            showStatus(`🎯 "${movieName}" moved back to Pool.`);
            await loadAllData();
        } catch(e) { showStatus("Error: " + e.message, true); }
    }
    
    async function deleteConsidered(consideredId, movieName) {
        if (!confirm(`Remove "${movieName}" from Considered?`)) return;
        try {
            await db.collection("considered").doc(consideredId).delete();
            showStatus(`Removed "${movieName}" from Considered.`);
            await loadAllData();
        } catch(e) { showStatus("Error: " + e.message, true); }
    }
    
    async function reorderConsidered(movieId, direction, currentIndex) {
        const newIndex = direction === 'up' ? currentIndex - 1 : currentIndex + 1;
        if (newIndex < 0 || newIndex >= consideredMovies.length) return;
        const targetMovie = consideredMovies[newIndex];
        const tempOrder = consideredMovies[currentIndex].order;
        const targetOrder = targetMovie.order;
        await db.collection("considered").doc(movieId).update({ order: targetOrder });
        await db.collection("considered").doc(targetMovie.id).update({ order: tempOrder });
        await loadAllData();
    }
    
    async function editWatchedDate(watchedId, movieName, currentDate) {
        const displayCurrent = formatDateForDisplay(currentDate);
        const newDate = prompt(`Edit date for "${movieName}"\nCurrent: ${displayCurrent}\n\nMM-DD-YYYY or N/A:`, displayCurrent);
        if (!newDate) return;
        let finalDate = newDate.trim().toUpperCase();
        if (finalDate !== "N/A" && !finalDate.match(/^\d{2}-\d{2}-\d{4}$/)) { alert("Use MM-DD-YYYY or N/A"); return; }
        try {
            await db.collection("watched").doc(watchedId).update({ date: finalDate });
            showStatus(`📅 Updated to ${finalDate}`);
            await loadAllData();
        } catch(e) { showStatus("Error: " + e.message, true); }
    }
    
    async function deleteWatched(watchedId, movieName) {
        if (!confirm(`Remove "${movieName}" from Watched history?`)) return;
        try {
            await db.collection("watched").doc(watchedId).delete();
            showStatus(`Removed "${movieName}".`);
            await loadAllData();
        } catch(e) { showStatus("Error: " + e.message, true); }
    }
    
    async function reorderWatched(watchedId, direction, currentIndex) {
        const naMovies = watchedMovies.filter(m => m.date === "N/A");
        const currentNaIndex = naMovies.findIndex(m => m.id === watchedId);
        if (direction === "up" && currentNaIndex > 0) {
            const above = naMovies[currentNaIndex - 1];
            const tempOrder = watchedMovies.find(m => m.id === watchedId).order;
            const aboveOrder = watchedMovies.find(m => m.id === above.id).order;
            await db.collection("watched").doc(watchedId).update({ order: aboveOrder });
            await db.collection("watched").doc(above.id).update({ order: tempOrder });
        } else if (direction === "down" && currentNaIndex < naMovies.length - 1) {
            const below = naMovies[currentNaIndex + 1];
            const tempOrder = watchedMovies.find(m => m.id === watchedId).order;
            const belowOrder = watchedMovies.find(m => m.id === below.id).order;
            await db.collection("watched").doc(watchedId).update({ order: belowOrder });
            await db.collection("watched").doc(below.id).update({ order: tempOrder });
        }
        await loadAllData();
    }
    
    async function addDirectToWatched() {
        const input = document.getElementById("directWatchedInput");
        const movieName = input.value.trim();
        if (!movieName) return;
        const isNA = document.getElementById("naCheckbox").checked;
        const dateToUse = isNA ? "N/A" : currentSaturdayId;
        if (isDuplicate(movieName, watchedMovies)) { showStatus(`⚠️ Already in Watched!`, true); return; }
        try {
            await db.collection("watched").add({ name: movieName, date: dateToUse, order: watchedMovies.length, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            input.value = "";
            document.getElementById("naCheckbox").checked = false;
            showStatus(`✅ Added to Watched (${dateToUse})`);
            await loadAllData();
        } catch(e) { showStatus("Error: " + e.message, true); }
    }
    
    async function addToPool() {
        const input = document.getElementById("movieInput");
        const movieName = input.value.trim();
        if (!movieName) return;
        if (isDuplicate(movieName, poolMovies)) { showStatus(`⚠️ Already in Pool!`, true); return; }
        if (isDuplicate(movieName, consideredMovies)) { showStatus(`⚠️ In Considered list!`, true); return; }
        try {
            await db.collection("moviePool").add({ name: movieName, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            input.value = "";
            showStatus(`➕ Added to Pool`);
            await loadAllData();
        } catch(e) { showStatus("Error: " + e.message, true); }
    }
    
    async function addToConsidered() {
        const input = document.getElementById("consideredInput");
        const movieName = input.value.trim();
        if (!movieName) return;
        if (isDuplicate(movieName, consideredMovies)) { showStatus(`⚠️ Already in Considered!`, true); return; }
        if (isDuplicate(movieName, poolMovies)) { showStatus(`⚠️ In Pool! Move it instead.`, true); return; }
        try {
            await db.collection("considered").add({ name: movieName, order: consideredMovies.length, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            input.value = "";
            showStatus(`➕ Added to Considered`);
            await loadAllData();
        } catch(e) { showStatus("Error: " + e.message, true); }
    }
    
    async function moveAllToConsidered() {
        if (poolMovies.length === 0) return;
        if (!confirm(`Move all ${poolMovies.length} movie(s) to Considered?`)) return;
        try {
            for (let movie of poolMovies) {
                await db.collection("considered").add({ name: movie.name, order: consideredMovies.length, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                await db.collection("moviePool").doc(movie.id).delete();
            }
            showStatus(`📦 Moved to Considered.`);
            await loadAllData();
        } catch(e) { showStatus("Error: " + e.message, true); }
    }
    
    async function spin() {
        if (isSpinning) { showStatus("Already spinning!", true); return; }
        if (poolMovies.length === 0) { showStatus("No movies in pool!", true); return; }
        isSpinning = true;
        const spinBtn = document.getElementById("spinBtn");
        const spinStatus = document.getElementById("spinStatus");
        spinBtn.innerText = "🌀 SPINNING...";
        const totalMovies = poolMovies.length;
        let steps = 0, maxSteps = 40 + Math.floor(Math.random() * 25), intervalTime = 50;
        if (spinInterval) clearInterval(spinInterval);
        spinInterval = setInterval(() => {
            currentHighlightIndex = (currentHighlightIndex + 1) % totalMovies;
            renderPool();
            steps++;
            if (steps > maxSteps - 18) intervalTime = 180;
            else if (steps > maxSteps - 28) intervalTime = 130;
            else if (steps > maxSteps - 36) intervalTime = 90;
            else if (steps > maxSteps - 42) intervalTime = 65;
            if (steps >= maxSteps) {
                clearInterval(spinInterval);
                spinInterval = null;
                const chosenMovie = poolMovies[currentHighlightIndex];
                document.querySelector('.spin-section').classList.add('shake');
                setTimeout(() => document.querySelector('.spin-section').classList.remove('shake'), 600);
                spinStatus.innerHTML = `🎉 LANDED ON: "${chosenMovie.name}"! 🎉<br>Click "Watched" above.`;
                spinBtn.innerText = "SPIN TO WIN!";
                isSpinning = false;
                setTimeout(() => document.querySelector('.movie-item.highlight')?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
            }
        }, intervalTime);
    }
    
    async function createNewSaturday() {
        const newDate = prompt("Enter Saturday (MM-DD-YYYY):", getThisSaturdayFormatted());
        if (!newDate || !newDate.match(/^\d{2}-\d{2}-\d{4}$/)) { alert("Use MM-DD-YYYY"); return; }
        try {
            await db.collection("saturdays").doc(newDate).set({ date: newDate });
            await loadSaturdays();
            showStatus(`📅 Created ${newDate}`);
        } catch(e) { showStatus("Error: " + e.message, true); }
    }
    
    function showStatus(msg, isError = false) {
        const statusDiv = document.getElementById("statusMsg");
        statusDiv.innerHTML = msg;
        statusDiv.style.color = isError ? "#ffaa99" : "#b9d0ff";
        setTimeout(() => { if (document.getElementById("statusMsg")?.innerHTML === msg) statusDiv.style.color = "#b9d0ff"; }, 4000);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; });
    }
    
    function checkPasscode() {
        if (sessionStorage.getItem("movieNightUnlocked") === "true") {
            document.getElementById("passcodeScreen").style.display = "none";
            document.getElementById("mainApp").style.display = "block";
            initApp();
            return true;
        }
        return false;
    }
    
    function unlock() {
        if (document.getElementById("passcodeInput").value === SECRET_PASSCODE) {
            sessionStorage.setItem("movieNightUnlocked", "true");
            document.getElementById("passcodeScreen").style.display = "none";
            document.getElementById("mainApp").style.display = "block";
            document.getElementById("passcodeError").innerText = "";
            initApp();
        } else {
            document.getElementById("passcodeError").innerText = "❌ Incorrect passcode.";
        }
    }
    
    async function initApp() {
        await loadSaturdays();
        await loadAllData();
        document.getElementById("addToPoolBtn").onclick = addToPool;
        document.getElementById("addToConsideredBtn").onclick = addToConsidered;
        document.getElementById("addDirectToWatchedBtn").onclick = addDirectToWatched;
        document.getElementById("spinBtn").onclick = spin;
        document.getElementById("newSaturdayBtn").onclick = createNewSaturday;
        document.getElementById("refreshBtn").onclick = () => loadAllData();
        document.getElementById("moveAllToConsideredBtn").onclick = moveAllToConsidered;
        document.getElementById("movieInput").addEventListener("keypress", e => { if (e.key === "Enter") addToPool(); });
        document.getElementById("consideredInput").addEventListener("keypress", e => { if (e.key === "Enter") addToConsidered(); });
        document.getElementById("directWatchedInput").addEventListener("keypress", e => { if (e.key === "Enter") addDirectToWatched(); });
        document.getElementById("saturdayPicker").addEventListener("change", async e => { currentSaturdayId = e.target.value; showStatus(`📅 Switched to ${currentSaturdayId}`); });
    }
    
    document.getElementById("unlockBtn").onclick = unlock;
    document.getElementById("passcodeInput").addEventListener("keypress", e => { if (e.key === "Enter") unlock(); });
    checkPasscode();
</script>
